 manifest into per-layer checklists</text><rect x="70" y="356" width="440" height="38" rx="10" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.6" stroke-dasharray="4 3"/><text x="290" y="372" text-anchor="middle" font-size="13.5" font-weight="600" fill="#334155">seeds/{layer}.json</text><text x="290" y="388" text-anchor="middle" font-size="11" fill="#64748B">candidate items each specialist MUST cover</text><rect x="70" y="420" width="440" height="50" rx="10" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.6"/><text x="290" y="441" text-anchor="middle" font-size="15" font-weight="700" fill="#9A3412">layer specialists  (sub-agents)</text><text x="290" y="459" text-anchor="middle" font-size="11.5" fill="#475569">database → domain → service → api / messaging → frontend → tests</text><rect x="70" y="496" width="440" height="38" rx="10" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.6" stroke-dasharray="4 3"/><text x="290" y="512" text-anchor="middle" font-size="13.5" font-weight="600" fill="#334155">layers/**/*.md</text><text x="290" y="528" text-anchor="middle" font-size="11" fill="#64748B">rebuild docs · [MUST]/[SHOULD]/[DON'T] · anchor-id headings</text><rect x="70" y="560" width="440" height="50" rx="10" fill="#EFF6FF" stroke="#2563EB" stroke-width="2.6"/><text x="290" y="581" text-anchor="middle" font-size="15" font-weight="700" fill="#1E3A8A">verify-coverage.mjs   =   manifest − docs</text><text x="290" y="599" text-anchor="middle" font-size="11.5" fill="#475569">pure set arithmetic · reproducible · names + line numbers</text><rect x="70" y="636" width="440" height="38" rx="10" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.6" stroke-dasharray="4 3"/><text x="290" y="652" text-anchor="middle" font-size="13.5" font-weight="600" fill="#334155">coverage/{layer}.json  +  gaps.md</text><text x="290" y="668" text-anchor="middle" font-size="11" fill="#64748B">exactly what's missing (if anything)</text><rect x="70" y="700" width="440" height="50" rx="10" fill="#FFF7ED" s